server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:3005/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 500M;
        proxy_connect_timeout 30s;
        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;
        proxy_buffering off;
    }

    location /outputs/ {
        proxy_pass http://backend:3005/outputs/;
        proxy_read_timeout 1200s;
    }

    location /final-outputs/ {
        proxy_pass http://backend:3005/final-outputs/;
        proxy_read_timeout 1200s;
    }

    location /uploads/ {
        proxy_pass http://backend:3005/uploads/;
        proxy_read_timeout 1200s;
    }

    location /temp/ {
        proxy_pass http://backend:3005/temp/;
        proxy_read_timeout 1200s;
    }
}
